#      interval: 30s
#      timeout: 10s
#      retries: 3
#      start_period: 40s

  postgres:
    image: postgres:18.3
    container_name: gitbuddy-local-postgres
    environment:
      POSTGRES_DB: GitBuddy
      POSTGRES_USER: gitbuddy
      POSTGRES_PASSWORD: gitbuddy
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data-gitbuddy:/var/lib/postgresql/data
    ports:
      - "5233:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitbuddy -d GitBuddy"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

volumes:
  postgres-data-gitbuddy:
    driver: local
