apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-buddy-frontend
  namespace: git-buddy
  labels:
    app: git-buddy-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: git-buddy-frontend
  template:
    metadata:
      labels:
        app: git-buddy-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/rauntska/git-buddy-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
