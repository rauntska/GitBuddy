name: git-buddy
services:
  nginx:
    image: nginx:alpine
    container_name: gitbuddy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started

  api:
    build:
      context: ../..
      dockerfile: GitBuddy.Api/Dockerfile
    container_name: gitbuddy-api
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=GitBuddy;Username=gitbuddy;Password=${DB_PASSWORD}
      - GitHub__ClientId=${GITHUB_CLIENT_ID}
      - GitHub__ClientSecret=${GITHUB_CLIENT_SECRET}
      - GitHub__RedirectUri=${GITHUB_REDIRECT_URI}
      - GitHub__WebhookSecret=${GITHUB_WEBHOOK_SECRET}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__ExpirationMinutes=${JWT_EXPIRATION_MINUTES}
      - Frontend__Url=${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:18.3
    container_name: gitbuddy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: GitBuddy
      POSTGRES_USER: gitbuddy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5233:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitbuddy -d GitBuddy"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

  frontend:
    build:
      context: ../..
      dockerfile: gitbuddy-vue/Dockerfile
    container_name: gitbuddy-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
    driver: local
